<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Individual Project Completion Countdown</title>

<style>
    
@keyframes blinkRunning {
    0% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1); }
}
    
/* ===== 3D Glass Close Button ===== */
.close-btn{
    position:fixed;
    top:10px;
    right:15px;
    width:55px;
    height:55px;

    border:none;
    
    border-radius:40%;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    font-size:32px;
    font-weight:bold;

    cursor:pointer;
    overflow:hidden;
    z-index:9999;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.35),
            rgba(255,0,0,0.20)
        );

    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    box-shadow:
        0 12px 25px rgba(0,0,0,0.45),
        inset 0 2px 3px rgba(255,255,255,0.7),
        inset 0 -4px 6px rgba(0,0,0,0.25);

    transition:all .25s ease;
}

/* Top glossy highlight */
.close-btn::before{
    content:"";
    position:absolute;
    top:6px;
    left:8px;
    width:70%;
    height:30%;

    border-radius:50%;

    background:
        linear-gradient(
            to bottom,
            rgba(255,255,255,0.9),
            rgba(255,255,255,0)
        );

    pointer-events:none;
}

/* Animated Shine */
.close-btn::after{
    content:"";
    position:absolute;

    top:-50%;
    left:-120%;

    width:60%;
    height:200%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.8),
            transparent
        );

    transform:rotate(25deg);

    animation:glassShine 3s infinite;
}

/* Shine Animation */
@keyframes glassShine{
    0%{
        left:-120%;
    }
    100%{
        left:180%;
    }
}

/* Hover Effect */
.close-btn:hover{
    transform:
        translateY(-3px)
        scale(1.10);

    box-shadow:
        0 18px 35px rgba(0,0,0,0.55),
        inset 0 3px 4px rgba(255,255,255,0.9),
        inset 0 -4px 6px rgba(0,0,0,0.15);
}

/* Pressed Effect */
.close-btn:active{
    transform:
        translateY(2px)
        scale(0.95);

    box-shadow:
        0 5px 10px rgba(0,0,0,0.3),
        inset 0 4px 8px rgba(0,0,0,0.35);
}

/* X symbol glow */
.close-btn span{
    text-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 20px rgba(255,255,255,0.4);
}
    
.footer{
    margin-top:30px;
    padding:15px;
    text-align:center;
    font-size:12px;
    color:rgba(255,255,255,0.7);

    background:rgba(255,255,255,0.05);
    border-top:1px solid rgba(255,255,255,0.15);

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
}
    
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:48px;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1c1c1c;
}

thead{
    background:#d72626;
}

th{
    padding:15px;
    font-size:18px;
    text-align:center;
}

td{
    padding:15px;
    text-align:center;
    border:1px solid rgba(255,255,255,.15);
    font-size:16px;
}

.running{
    color:#f78605;
    font-weight:bold;
}

.completed{
    color:#00ff66;
    font-weight:bold;
}

.delayed{
    color:#ff2e2e;
    font-weight:bold;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    display:inline-block;
    margin-left:8px;
}

.green{
    background:#11e302;
}
    
.running-dot{
    background:#0bf707;
    animation: blinkRunning 1s infinite;
}
    
.red{
    background:#ff3131;
}

</style>
</head>

<body>

<button class="close-btn" onclick="closeTable()">
    <span>×</span>
</button>

<div id="content">

<h1>Individual Project Completion Countdown</h1>

<div class="table-container">

<table>

<thead>
<tr>
<th>Barangay, Municipality</th>
<th>Actual Start Date</th>
<th>Target Completion Date</th>
<th>Actual Completion Date</th>
<th>Physical Accomplishment</th>
<th>Days Remaining</th>
<th>% Time Elapsed</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody">
<tr>
    <td colspan="8">Loading data...</td>
</tr>
</tbody>

</table>

</div>

<script>

const SHEET_URL =
"https://script.google.com/macros/s/AKfycbzXrtAV4koA2bX6aS2-mX_RfgomqpRhVJx6No8JP76yMM6qZFbweOZtdZU0OQ3BOcHgaA/exec";

function calculateDaysRemaining(targetDate){

    const today = new Date();
    today.setHours(0,0,0,0);

    const target = new Date(targetDate);
    target.setHours(0,0,0,0);

    const diff =
      Math.ceil(
      (target - today) /
      (1000 * 60 * 60 * 24));

    return diff > 0 ? diff : 0;
}

function calculatePercentElapsed(startDate,targetDate){

    const start = new Date(startDate);
    const target = new Date(targetDate);
    const today = new Date();

    const total = target - start;
    const elapsed = today - start;

    let percent = (elapsed / total) * 100;

    if(percent < 0) percent = 0;
    if(percent > 100) percent = 100;

    return percent.toFixed(1);
}

function determineStatus(daysRemaining, completionDate, targetDate){

    if(completionDate && completionDate !== ""){

        const actual = new Date(completionDate);
        const target = new Date(targetDate);

        actual.setHours(0,0,0,0);
        target.setHours(0,0,0,0);

        if(actual < target){
            return {
                text:"Completed ahead of Time",
                class:"completed",
                dot:"green"
            };
        }

        if(actual.getTime() === target.getTime()){
            return {
                text:"Completed on Time",
                class:"completed",
                dot:"green"
            };
        }

        return {
            text:"Completed Late",
            class:"delayed",
            dot:"green"
        };
    }

    if(daysRemaining <= 0){
        return {
            text:"Delayed",
            class:"delayed",
            dot:"red"
        };
    }

    return {
        text:"Running",
        class:"running",
        dot:"running-dot"
    };
}

async function loadProjects(){

    try{

        const response = await fetch(SHEET_URL);

        const data = await response.json();

        const tbody =
          document.getElementById("tableBody");

        tbody.innerHTML = "";

        data.forEach(project=>{

            const daysRemaining =
              calculateDaysRemaining(
              project.targetDate);

            const percentElapsed =
              calculatePercentElapsed(
              project.startDate,
              project.targetDate);

            const status =
              determineStatus(
              daysRemaining,
              project.completionDate,
              project.targetDate);

            tbody.innerHTML += `
            <tr>

                <td>${project.barangay || "-"}</td>

                <td>${formatDate(project.startDate)}</td>

                <td>${formatDate(project.targetDate)}</td>

                <td>${formatDate(project.completionDate)}</td>

                <td>${
                    project.accomplishment !== ""
                    && project.accomplishment != null
                    ? (Number(project.accomplishment) * 100).toFixed(2) + "%"
                    : "-"
                }</td>

                <td>${daysRemaining}</td>

                <td>${percentElapsed}%</td>

                <td class="${status.class}">
                    ${status.text}
                    <span class="dot ${status.dot}"></span>
                </td>

            </tr>
            `;
        });

    }catch(error){

        console.error("Error loading data:", error);

    }
}

function formatDate(dateValue){

    if(!dateValue) return "-";

    const date = new Date(dateValue);

    if(isNaN(date)) return "-";

    return date.toISOString().split("T")[0];
}

loadProjects();

function closeTable(){
    window.history.back();
}
    
</script>
    
<footer class="footer">
    KKB-CDD Monitoring System | Developed by Ghilous © 2026
</footer>
    
</body>
</html>
